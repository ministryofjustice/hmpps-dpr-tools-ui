version: 2.1

orbs:
  hmpps: ministryofjustice/hmpps@11
  slack: circleci/slack@4.12.1
  mem: circleci/rememborb@0.0.2

parameters:
  alerts-slack-channel:
    type: string
    default: dpr_cicd_alerts

  releases-slack-channel:
    type: string
    default: dpr_cicd_approvals

  node-version:
    type: string
    default: 24.12-browsers

jobs:
  build:
    executor:
      name: hmpps/node
      tag: << pipeline.parameters.node-version >>
    steps:
      - checkout
      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
      - run:
          name: Install Dependencies
          command: npm run setup --no-audit
      - save_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
            - ~/.cache
      - run:
          name: Build
          command: |
            export GIT_REF="$CIRCLE_SHA1"
            npm run build
            DATE=$(date '+%Y-%m-%d')
            export BUILD_NUMBER=${DATE}.${CIRCLE_BUILD_NUM}
            npm run record-build-info
      - run:
          # Run linter after build because the integration test code depend on compiled typescript...
          name: Linter check
          command: npm run lint
      - persist_to_workspace:
          root: .
          paths:
            - node_modules
            - build-info.json
            - build
            - dist
            - .cache/Cypress

  unit_test:
    executor:
      name: hmpps/node
      tag: << pipeline.parameters.node-version >>
    steps:
      - checkout
      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
      - run:
          name: unit tests
          command: npm run test:ci
      - store_test_results:
          path: test_results
      - store_artifacts:
          path: test_results/unit-test-reports.html

  integration_test:
    executor:
      name: hmpps/node_redis
      node_tag: << pipeline.parameters.node-version >>
      redis_tag: '7.0'
    steps:
      - checkout
      - attach_workspace:
          at: ~/app
      - run:
          name: Install missing OS dependency
          command: sudo apt-get install libxss1
      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
      - run:
          name: Get wiremock
          command: curl -o wiremock.jar https://repo1.maven.org/maven2/org/wiremock/wiremock-standalone/3.3.1/wiremock-standalone-3.3.1.jar
      - run:
          name: Run wiremock
          command: java -jar wiremock.jar --port 9091
          background: true
      - run:
          name: Run the node (prisons) app.
          command: npm run start-feature
          background: true
      - run:
          name: Run the node (probation) app.
          command: npm run start-feature:probation
          background: true
      - run:
          name: Wait for node app to start
          command: sleep 5
      - run:
          name: Check typescript build
          command: npm run typecheck
      - run:
          name: integration tests
          command: npm run int-test
      - store_test_results:
          path: test_results
      - store_artifacts:
          path: cypress-tests/integration-tests/videos
      - store_artifacts:
          path: cypress-tests/integration-tests/screenshots

  acceptance_test:
    executor:
      name: hmpps/node_redis
      node_tag: << pipeline.parameters.node-version >>
      redis_tag: '7.0'
    circleci_ip_ranges: true
    steps:
      - checkout
      - attach_workspace:
          at: ~/app
      - run:
          name: Install missing OS dependency
          command: sudo apt-get install libxss1
      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
      - run:
          name: Ensure old pods have spun down
          command: sleep 30
      - run:
          name: acceptance tests
          command: npm run acceptance-test
      - store_test_results:
          path: test_results
      - store_artifacts:
          path: cypress-tests/acceptance-tests/videos
      - store_artifacts:
          path: cypress-tests/acceptance-tests/screenshots

  remember-app-version:
    executor:
      name: hmpps/node
      tag: << pipeline.parameters.node-version >>
    steps:
      - mem/remember:
          env_var: APP_VERSION
          value: 'Build.${CIRCLE_SHA1}'

workflows:
  version: 2
  build-test-and-deploy:
    jobs:
      - build:
          filters:
            tags:
              ignore: /.*/
      - unit_test:
          requires:
            - build
      - integration_test:
          requires:
            - build
      - hmpps/helm_lint:
          name: helm_lint_dev
      - hmpps/helm_lint:
          name: helm_lint_test
          env: test
      - hmpps/helm_lint:
          name: helm_lint_preprod
          env: preprod
      - hmpps/helm_lint:
          name: helm_lint_prod
          env: prod
      - hmpps/helm_lint:
          name: helm_lint_probation_dev
          chart_name: hmpps-dpr-tools-ui-probation
          env: probation-dev
      - hmpps/helm_lint:
          name: helm_lint_probation_test
          chart_name: hmpps-dpr-tools-ui-probation
          env: probation-test
      - hmpps/helm_lint:
          name: helm_lint_probation_preprod
          chart_name: hmpps-dpr-tools-ui-probation
          env: probation-preprod
      - hmpps/helm_lint:
          name: helm_lint_probation_prod
          chart_name: hmpps-dpr-tools-ui-probation
          env: probation-prod
      - hmpps/build_docker:
          name: build_docker
          additional_docker_tag: 'Build.${CIRCLE_SHA1}'
          additional_docker_build_args: --build-arg GIT_REF=${CIRCLE_SHA1} --progress=plain
          filters:
            branches:
              only:
                - main
                - tools-ui-probation
      - remember-app-version:
          name: remember-version-for-dev
          requires:
            - build_docker
      - hmpps/deploy_env:
          name: deploy_dev
          env: 'dev'
          jira_update: true
          release_name: PROJECT_NAME_ENV_NAME
          context:
            - hmpps-common-vars
            - hmpps-dpr-tools-ui-dev
          filters:
            branches:
              only:
                - main
                - tools-ui-probation
          requires:
            - helm_lint_dev
            - helm_lint_test
            - helm_lint_preprod
            - helm_lint_prod
            - unit_test
            - integration_test
            - remember-version-for-dev
          helm_timeout: 5m
      - remember-app-version:
          name: remember-version-for-probation-dev
          requires:
            - build_docker
      - hmpps/deploy_env:
          name: deploy_probation_dev
          env: 'probation-dev'
          release_name: hmpps-dpr-tools-ui-probation
          chart_name: hmpps-dpr-tools-ui-probation
          jira_update: true
          context:
            - hmpps-common-vars
            - hmpps-dpr-tools-ui-dev-probation
          filters:
            branches:
              only:
                - main
                - tools-ui-probation
          requires:
            - helm_lint_probation_dev
            - helm_lint_probation_test
            - helm_lint_probation_preprod
            - helm_lint_probation_prod
            - unit_test
            - integration_test
            - remember-version-for-probation-dev
          helm_timeout: 5m
      - acceptance_test:
          requires:
            - deploy_dev
          context:
            - hmpps-digital-prison-reporting-mi-auth
      - request-test-approval:
          type: approval
          requires:
            - acceptance_test
      - request-probation-test-approval:
          type: approval
          requires:
            - acceptance_test
      - remember-app-version:
          name: remember-version-for-test
          requires:
            - request-test-approval
      - remember-app-version:
          name: remember-version-for-probation-test
          requires:
            - request-probation-test-approval
      - hmpps/deploy_env:
          name: deploy_test
          env: 'test'
          jira_update: true
          release_name: PROJECT_NAME_ENV_NAME
          context:
            - hmpps-common-vars
            - hmpps-dpr-tools-ui-test
          requires:
            - remember-version-for-test
          helm_timeout: 5m
      - hmpps/deploy_env:
          name: deploy_probation_test
          env: 'probation-test'
          jira_update: true
          release_name: hmpps-dpr-tools-ui-probation
          chart_name: hmpps-dpr-tools-ui-probation
          context:
            - hmpps-common-vars
            - hmpps-dpr-tools-ui-test-probation
          requires:
            - helm_lint_probation_test
            - remember-version-for-probation-test
          helm_timeout: 5m
      - request-preprod-approval:
          type: approval
          requires:
            - acceptance_test
      - request-probation-preprod-approval:
          type: approval
          requires:
            - acceptance_test
      - remember-app-version:
          name: remember-version-for-preprod
          requires:
            - request-preprod-approval
      - remember-app-version:
          name: remember-version-for-probation-preprod
          requires:
            - request-probation-preprod-approval
      - hmpps/deploy_env:
          name: deploy_preprod
          env: 'preprod'
          jira_update: true
          jira_env_type: staging
          release_name: PROJECT_NAME_ENV_NAME
          context:
            - hmpps-common-vars
            - hmpps-dpr-tools-ui-preprod
          requires:
            - remember-version-for-preprod
          helm_timeout: 5m
      - hmpps/deploy_env:
          name: deploy_probation_preprod
          env: 'probation-preprod'
          jira_update: true
          jira_env_type: staging
          release_name: hmpps-dpr-tools-ui-probation
          chart_name: hmpps-dpr-tools-ui-probation
          context:
            - hmpps-common-vars
            - hmpps-dpr-tools-ui-probation-preprod
          requires:
            - helm_lint_probation_preprod
            - remember-version-for-preprod-probation
          helm_timeout: 5m
      - request-prod-approval:
          type: approval
          requires:
            - deploy_preprod
      - request-probation-prod-approval:
          type: approval
          requires:
            - deploy_probation_preprod
      - remember-app-version:
          name: remember-version-for-prod
          requires:
            - request-prod-approval
      - remember-app-version:
          name: remember-version-for-probation-prod
          requires:
            - request-probation-prod-approval
      - hmpps/deploy_env:
          name: deploy_prod
          env: 'prod'
          jira_update: true
          jira_env_type: production
          slack_notification: true
          slack_channel_name: << pipeline.parameters.releases-slack-channel >>
          release_name: PROJECT_NAME_ENV_NAME
          context:
            - hmpps-common-vars
            - hmpps-dpr-tools-ui-prod
          requires:
            - remember-version-for-prod
          helm_timeout: 5m
      - hmpps/deploy_env:
          name: deploy_probation_prod
          env: 'probation-prod'
          jira_update: true
          jira_env_type: production
          slack_notification: true
          slack_channel_name: << pipeline.parameters.releases-slack-channel >>
          release_name: hmpps-dpr-tools-ui-probation
          chart_name: hmpps-dpr-tools-ui-probation
          context:
            - hmpps-common-vars
            - hmpps-dpr-tools-ui-probation-prod
          requires:
            - helm_lint_probation_prod
            - remember-version-for-prod-probation
          helm_timeout: 5m
