version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 3
  - package-ecosystem: 'github-actions'
    directory: '/' # Location of workflow files
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 3
  - package-ecosystem: "helm"
    directory: "/helm_deploy/hmpps-dpr-tools-ui"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
