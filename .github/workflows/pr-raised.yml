name: PR preparation

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  preparation:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.x

      - name: SLSA - supply chain attack mitigation
        uses: ministryofjustice/devsecops-actions/sca/slsa@7dc13c20e2bf541b8a77fa1320a04983b18846f6 #v1.6.0
        with:
          security-patch-package-exclusion: '@ministryofjustice/hmpps-digital-prison-reporting-frontend'

      - run: npm run setup --no-audit

      - name: Setup Python
        uses: actions/setup-python@0cb1a84326b90186fcd211036c65b42819794c87
        with:
          python-version: '3.x'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit checks
        run: pre-commit run --all-files

      - name: Calculate test coverage
        run: |
          npm run test > logs.txt
          gh pr comment ${{ github.event.pull_request.number }} --body "$(grep '% Stmts' logs.txt -A2)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
